<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — The Desk Reset</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --oat: #F2EFE8;
            --obsidian: #0D0D0D;
            --crimson: #E63946;
            --stone: #A8A7A3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--oat);
            color: var(--obsidian);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
            flex-wrap: wrap;
            gap: 16px;
        }

        header h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.03em;
        }

        header h1 span { color: var(--crimson); }

        .last-updated {
            font-size: 14px;
            color: var(--stone);
        }

        .last-updated strong { color: var(--obsidian); }

        /* Metric Cards */
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 48px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 28px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .card .label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--stone);
            margin-bottom: 8px;
        }

        .card .value {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 42px;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .card .value.crimson { color: var(--crimson); }
        .card .value.green { color: #22c55e; }

        .card .sub {
            font-size: 14px;
            color: var(--stone);
            margin-top: 6px;
        }

        .card.highlight {
            background: var(--obsidian);
            border-color: var(--obsidian);
        }

        .card.highlight .label { color: rgba(255,255,255,0.4); }
        .card.highlight .value { color: #fff; }
        .card.highlight .sub { color: rgba(255,255,255,0.5); }

        /* Daily Chart */
        .chart-section h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .chart {
            background: #fff;
            border-radius: 10px;
            padding: 28px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 160px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            position: relative;
        }

        .bar-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            height: 100%;
            justify-content: flex-end;
        }

        .bar-pv {
            width: 100%;
            max-width: 24px;
            background: var(--obsidian);
            border-radius: 3px 3px 0 0;
            min-height: 2px;
            transition: height 0.3s;
        }

        .bar-cl {
            width: 100%;
            max-width: 24px;
            background: var(--crimson);
            border-radius: 3px 3px 0 0;
            min-height: 2px;
            transition: height 0.3s;
        }

        .chart-labels {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .chart-labels span {
            flex: 1;
            text-align: center;
            font-size: 10px;
            color: var(--stone);
            font-weight: 500;
        }

        .legend {
            display: flex;
            gap: 24px;
            margin-top: 20px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--stone);
        }

        .legend-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        .legend-item .dot.pv { background: var(--obsidian); }
        .legend-item .dot.cl { background: var(--crimson); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--stone);
        }

        .empty-state h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: var(--obsidian);
            margin-bottom: 8px;
        }

        .setup-steps {
            text-align: left;
            max-width: 480px;
            margin: 24px auto 0;
            background: rgba(230,57,70,0.04);
            padding: 24px;
            border-radius: 8px;
            border: 1px solid rgba(230,57,70,0.1);
        }

        .setup-steps h4 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 14px;
            color: var(--crimson);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .setup-steps ol {
            font-size: 14px;
            line-height: 1.8;
            padding-left: 20px;
        }

        .setup-steps code {
            background: rgba(0,0,0,0.04);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
        }

        .badge {
            display: inline-block;
            background: #22c55e;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge.off {
            background: var(--stone);
        }

        @media (max-width: 700px) {
            .metrics {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .card .value {
                font-size: 32px;
            }

            header h1 {
                font-size: 22px;
            }

            .container {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>The Desk Reset <span>Stats</span></h1>
        <div class="last-updated">Last updated: <strong id="timestamp">—</strong></div>
    </header>

    <div id="metrics" class="metrics">
        <div class="card">
            <div class="label">Page Views</div>
            <div class="value crimson" id="pageviews">—</div>
            <div class="sub">Total landing page visits</div>
        </div>
        <div class="card highlight">
            <div class="label">Conversion Rate</div>
            <div class="value" id="conversion">—</div>
            <div class="sub">Clicks ÷ Page Views</div>
        </div>
        <div class="card">
            <div class="label">Gumroad Clicks</div>
            <div class="value green" id="clicks">—</div>
            <div class="sub">CTA button clicks</div>
        </div>
    </div>

    <div class="chart-section">
        <h2>Daily Activity <span class="badge" id="status-badge">live</span></h2>
        <div class="chart" id="chart">
            <div class="chart-bars" id="chart-bars"></div>
            <div class="legend">
                <div class="legend-item"><span class="dot pv"></span> Page views</div>
                <div class="legend-item"><span class="dot cl"></span> Clicks</div>
            </div>
        </div>
    </div>
</div>

<script>
    (async function () {
        const $ = id => document.getElementById(id);
        const ts = $('timestamp');
        const pvEl = $('pageviews');
        const clEl = $('clicks');
        const cvEl = $('conversion');
        const bars = $('chart-bars');
        const badge = $('status-badge');

        try {
            const res = await fetch('/api/stats');
            const data = await res.json();

            // Update timestamp
            const now = new Date();
            ts.textContent = now.toLocaleString();

            // Handle no-data / Redis-not-configured
            if (data.note) {
                badge.textContent = 'not configured';
                badge.className = 'badge off';
                bars.innerHTML = `
                    <div class="empty-state">
                        <h3>No data yet</h3>
                        <p>${data.note}</p>
                        <div class="setup-steps">
                            <h4>Quick Setup</h4>
                            <ol>
                                <li>Go to <a href="https://console.upstash.com" target="_blank">console.upstash.com</a> &rarr; Create Redis database (free tier)</li>
                                <li>Copy your <strong>REST URL</strong> and <strong>REST Token</strong></li>
                                <li>Add them to Vercel:<br>
                                    <code>UPSTASH_REDIS_REST_URL</code> and <code>UPSTASH_REDIS_REST_TOKEN</code>
                                </li>
                                <li>Deploy &amp; refresh this page</li>
                            </ol>
                        </div>
                    </div>`;
                return;
            }

            // Populate metrics
            pvEl.textContent = data.pageviews.toLocaleString();
            clEl.textContent = data.clicks.toLocaleString();
            cvEl.textContent = data.conversionRate + '%';

            // Build chart bars
            if (!data.daily || data.daily.length === 0) {
                bars.innerHTML = '<div class="empty-state"><p>No daily data yet.</p></div>';
                return;
            }

            const maxPv = Math.max(...data.daily.map(d => d.pageviews), 1);
            const maxCl = Math.max(...data.daily.map(d => d.clicks), 1);
            const maxVal = Math.max(maxPv, maxCl, 1);

            bars.innerHTML = data.daily.map(d => {
                const pvH = (d.pageviews / maxVal) * 130;
                const clH = (d.clicks / maxVal) * 130;
                const label = d.date.slice(5); // "MM-DD"
                return `<div class="bar-group">
                    <div class="bar-pv" style="height:${pvH}px" title="${d.date}: ${d.pageviews} views"></div>
                    <div class="bar-cl" style="height:${clH}px" title="${d.date}: ${d.clicks} clicks"></div>
                    <span style="font-size:9px;color:var(--stone);margin-top:2px">${label}</span>
                </div>`;
            }).join('');

            // Auto-refresh every 30 seconds
            setTimeout(() => location.reload(), 30000);

        } catch (err) {
            bars.innerHTML = `<div class="empty-state"><h3>Could not load stats</h3><p>${err.message}</p></div>`;
            badge.textContent = 'error';
            badge.className = 'badge off';
        }
    })();
</script>
</body>
</html>
